name: Release

on:
    push:
        tags: ["v*"]

permissions:
    contents: write

jobs:
    build-client:
        name: Build Client (${{ matrix.target }})
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      artifact: client.exe
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      artifact: client
                    - os: macos-latest
                      target: aarch64-apple-darwin
                      artifact: client

        steps:
            - uses: actions/checkout@v4

            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: client

            - name: Build release binary
              working-directory: client
              env:
                  STS2_API_KEY: ${{ secrets.STS2_API_KEY }}
              run: cargo build --release --target ${{ matrix.target }}

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: client-${{ matrix.target }}
                  path: client/target/${{ matrix.target }}/release/${{ matrix.artifact }}

    create-release:
        name: Create GitHub Release
        needs: build-client
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Rename binaries
              run: |
                  mkdir -p release
                  cp artifacts/client-x86_64-pc-windows-msvc/client.exe release/sts2-collector-windows-x64.exe
                  cp artifacts/client-x86_64-unknown-linux-gnu/client release/sts2-collector-linux-x64
                  cp artifacts/client-aarch64-apple-darwin/client release/sts2-collector-macos-arm64
                  chmod +x release/sts2-collector-linux-x64 release/sts2-collector-macos-arm64

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: release/*

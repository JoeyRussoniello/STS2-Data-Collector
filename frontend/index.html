<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STS2 Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,600&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <link rel="icon" type="image/webp" href="./favicon.webp"> <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="stone-texture" aria-hidden="true"></div>
  <header class="topbar">
    <a href="#overview" class="topbar__brand">Eldritch Archive</a>
    <div class="topbar__actions">
      <button class="topbar__btn" id="btn-settings" title="Archive Configuration">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="player-scope" id="player-scope" style="display:none">
    <span class="material-symbols-outlined" style="font-size:18px">person</span>
    <span>Viewing player: <strong id="scope-steam-id"></strong></span>
    <a href="#overview" class="player-scope__clear" id="scope-clear">✕ View Global Stats</a>
  </div>

  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar__header">
        <h2 class="sidebar__title">The Arcane Ledger</h2>
        <p class="sidebar__sub">SLAY THE SPIRE II ANALYTICS</p>
      </div>
      <ul class="sidebar__nav" id="nav-links">
        <li><a href="#overview" class="nav-link active" data-page="overview">
          <span class="material-symbols-outlined nav-icon">dashboard</span>
          Global Overview
        </a></li>
        <li><a href="#characters" class="nav-link" data-page="characters">
          <span class="material-symbols-outlined nav-icon">groups</span>
          Character Stats
        </a></li>
        <li><a href="#cards" class="nav-link" data-page="cards">
          <span class="material-symbols-outlined nav-icon">style</span>
          Card Analytics
        </a></li>
        <li><a href="#relics" class="nav-link" data-page="relics">
          <span class="material-symbols-outlined nav-icon">diamond</span>
          Relic &amp; Encounters
        </a></li>
      </ul>
      <div class="sidebar__footer">
        <div class="sidebar__player-search">
          <label class="filter-label">PLAYER LOOKUP</label>
          <div class="steam-input-wrap">
            <input type="text" class="steam-input" id="steam-id-input" placeholder="Enter Steam ID…">
            <button class="steam-input-btn" id="steam-id-go">→</button>
          </div>
        </div>
        <div class="api-indicator" id="api-indicator">
          <span class="api-dot" id="api-dot"></span>
          <span class="api-label" id="api-label">Connecting…</span>
        </div>
      </div>
    </nav>

    <main class="content" id="content">
      <div class="loading-state"><div class="eldritch-spinner"></div><p>Consulting the archives…</p></div>
    </main>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal__header">
        <h2>Archive Configuration</h2>
        <button class="modal__close" id="btn-close-modal">&times;</button>
      </div>
      <div class="modal__body" id="settings-body"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>

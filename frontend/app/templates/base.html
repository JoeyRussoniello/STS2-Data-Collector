<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}STS2 Stats{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="top-nav">
    <div class="nav-inner">
      <a href="{{ url_for('dashboard.global_dashboard') }}" class="nav-brand">
        <span class="brand-icon">⚔</span>
        <span class="brand-text">STS2 Stats</span>
      </a>
      <div class="nav-links">
        <a href="{{ url_for('dashboard.global_dashboard') }}" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">Dashboard</a>
      </div>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>STS2 Community Stats &middot; Data collected from volunteer players</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
